<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card | Sony Alpha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="product-container">
        <section class="info-side">
            <header>
                <h2 class="title">Description</h2>
                <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Cumque consequatur corporis vitae nobis, ut veniam earum expedita eaque at placeat perferendis unde voluptates.</p>
            </header>

            <div class="rating">
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="far fa-star"></i>
                <i class="far fa-star"></i>
            </div>

            <div class="pricing">
                <span class="old-price">$1800.00</span>
                <span class="current-price">$1500.00</span>
            </div>

            <button type="button" class="cart-btn">Add To Cart</button>
        </section>

        <section class="visual-side">
            <figure class="product-image">
                <img src="img/camera.png" alt="Sony Alpha A7 Kit">
                
                <figcaption class="product-meta">
                    <span class="brand">SONY</span>
                    <h3 class="model-name">SONY ALPHA A7 KIT</h3>
                    <span class="shipping-tag">FREE SHIPPING</span>
                    <button type="button" class="more-btn">Login For More</button>
                </figcaption>
            </figure>
        </section>
    </main>

</body>
</html>
